<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Useful Tools は、一般向けの便利ツールから開発者向けのユーティリティまで、用途別に選べる軽量ツール集です。ブラウザだけで手軽に使えて、作業効率をシンプルに向上させます。">
    <title>Useful Tools - 用途別に選べる、万能ツールセット。</title>
    
    <!-- Font Awesome -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    
    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/variables.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./style.css" data-page>
    
    <!-- JS -->
    <script type="module" src="./index.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-416K6GDFJP"></script>
  </head>

  <body>
    <com-header></com-header>
    
    <main>
      <!-- Hero Section -->
      <section id="hero">
        <div id="page">
          <h1>用途別に<span class="accent">選べる、</span><span class="accent">万能ツール</span>セット。</h1>
          <p class="desc">シンプルなツールで、日常を少し便利に</p>

          <div id="cta">
            <button id="cta-search">ツールを探す<i class="fa-solid fa-arrow-right"></i></button>
            <button id="cta-category" class="nostyle">カテゴリで探す<i class="fa-solid fa-arrow-right"></i></button>
          </div>
        </div>
      </section>

      <!-- Tools Section -->
      <section class="tool-section">
        <h2><span class="material-symbols-outlined">keep</span>常駐ツール</h2>

        <div class="tool-grid">
          <article class="tool-card">
            <div class="icon"><span class="material-symbols-outlined">music_note</span></div>
            <h3>ミュージックプレイヤー</h3>
            <p>ローカルファイルをアップロードして、再生できます</p>
            <a href="./tools/music-player/" class="tool-link">開く<i class="fa-solid fa-arrow-right"></i></a>
          </article>
        </div>
      </section>
    </main>

    <com-footer></com-footer>
  </body>
</html>
